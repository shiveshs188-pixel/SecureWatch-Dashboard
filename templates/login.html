{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="auth-title">Z+ Security Login</h1>
            <p class="auth-subtitle">Verify identity to access threat analytics</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-container">
                    <i class="fas fa-user-secret"></i>
                    <input type="text" id="username" name="username" class="input-field" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-container">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" name="password" class="input-field" placeholder="Enter security password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="fas fa-shield-halved"></i>
                <span>Authenticate User</span>
            </button>
        </form>

        <div class="auth-footer">
            <span>New analyst? </span>
            <a href="{{ url_for('register') }}">Create Security Profile</a>
        </div>

    </div>
</div>
{% endblock %}
